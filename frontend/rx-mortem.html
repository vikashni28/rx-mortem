<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RX-MORTEM — Hybrid Static Malware Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg-void: #050608;
    --bg-panel: #0a0c10;
    --bg-card: #0e1118;
    --bg-elevated: #13171f;
    --border: #1c2330;
    --border-bright: #2a3448;
    --accent-cyan: #00e5ff;
    --accent-red: #ff2d55;
    --accent-orange: #ff6b2b;
    --accent-green: #00ff88;
    --accent-yellow: #ffd600;
    --text-primary: #e8ecf4;
    --text-secondary: #8b9cb5;
    --text-dim: #4a5568;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui: 'Rajdhani', sans-serif;
    --font-display: 'Orbitron', monospace;
    --grid-color: rgba(0, 229, 255, 0.03);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,229,255,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,12,16,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    border: 1px solid var(--accent-cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--accent-cyan);
    font-weight: 900;
    letter-spacing: 1px;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }

  .logo-icon::before {
    content: '';
    position: absolute;
    inset: 2px;
    background: rgba(0,229,255,0.05);
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
  }

  .logo-text {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--text-primary);
  }

  .logo-text span { color: var(--accent-cyan); }

  .header-subtitle {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-green); }
    50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent-green); }
  }

  /* MAIN LAYOUT */
  .main { max-width: 1280px; margin: 0 auto; padding: 40px; }

  /* UPLOAD ZONE */
  .upload-section {
    margin-bottom: 40px;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent-cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-bright), transparent);
  }

  .upload-zone {
    border: 1px dashed var(--border-bright);
    background: var(--bg-card);
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(0,229,255,0.03), transparent);
    pointer-events: none;
  }

  .upload-zone.dragging {
    border-color: var(--accent-cyan);
    background: rgba(0,229,255,0.04);
    box-shadow: 0 0 40px rgba(0,229,255,0.08) inset;
  }

  .upload-zone:hover {
    border-color: rgba(0,229,255,0.4);
    background: rgba(0,229,255,0.02);
  }

  .upload-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border: 1px solid var(--border-bright);
    display: flex;
    align-items: center;
    justify-content: center;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }

  .upload-icon svg { color: var(--text-dim); }

  .upload-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .upload-desc {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .upload-desc span {
    color: var(--accent-cyan);
    opacity: 0.7;
  }

  input[type="file"] { display: none; }

  /* SCAN BUTTON */
  .btn-scan {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 36px;
    background: transparent;
    border: 1px solid var(--accent-cyan);
    color: var(--accent-cyan);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.15s;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    text-transform: uppercase;
  }

  .btn-scan:hover:not(:disabled) {
    background: rgba(0,229,255,0.08);
    box-shadow: 0 0 20px rgba(0,229,255,0.15);
  }

  .btn-scan:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    border-color: var(--text-dim);
    color: var(--text-dim);
  }

  .btn-scan.loading {
    border-color: var(--accent-orange);
    color: var(--accent-orange);
  }

  /* FILE INFO BAR */
  .file-info-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    margin-top: 16px;
    margin-bottom: 16px;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }

  .file-tag {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent-cyan);
    background: rgba(0,229,255,0.07);
    padding: 4px 12px;
    border: 1px solid rgba(0,229,255,0.2);
    letter-spacing: 1px;
  }

  .file-name {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-primary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-size-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ERROR BANNER */
  .error-banner {
    padding: 16px 20px;
    background: rgba(255,45,85,0.08);
    border: 1px solid rgba(255,45,85,0.3);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent-red);
    letter-spacing: 1px;
    margin-bottom: 24px;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }

  /* RESULTS LAYOUT */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .results-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  /* VERDICT CARD */
  .verdict-card {
    grid-column: 1 / -1;
    padding: 32px 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 40px;
    clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
    position: relative;
    overflow: hidden;
  }

  .verdict-card.malicious {
    border-color: rgba(255,45,85,0.4);
    background: rgba(255,45,85,0.04);
  }

  .verdict-card.suspicious {
    border-color: rgba(255,107,43,0.4);
    background: rgba(255,107,43,0.04);
  }

  .verdict-card.benign {
    border-color: rgba(0,255,136,0.3);
    background: rgba(0,255,136,0.03);
  }

  .verdict-score-ring {
    flex-shrink: 0;
    position: relative;
    width: 100px;
    height: 100px;
  }

  .verdict-score-ring canvas { position: absolute; inset: 0; }

  .verdict-score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .verdict-score-number {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 900;
    line-height: 1;
  }

  .verdict-score-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .verdict-info { flex: 1; }

  .verdict-badge {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .verdict-badge.malicious { color: var(--accent-red); text-shadow: 0 0 20px rgba(255,45,85,0.5); }
  .verdict-badge.suspicious { color: var(--accent-orange); text-shadow: 0 0 20px rgba(255,107,43,0.5); }
  .verdict-badge.benign { color: var(--accent-green); text-shadow: 0 0 20px rgba(0,255,136,0.3); }

  .verdict-filename {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .verdict-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .verdict-reasons {
    flex-shrink: 0;
    max-width: 380px;
  }

  .reasons-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .reason-item {
    display: flex;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.5;
    letter-spacing: 0.5px;
  }

  .reason-item:last-child { border-bottom: none; }

  .reason-bullet { color: var(--accent-cyan); flex-shrink: 0; margin-top: 1px; }

  /* PANEL CARD */
  .panel-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 24px;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }

  .panel-card-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* SCORE BARS */
  .score-component {
    margin-bottom: 18px;
  }

  .score-component:last-child { margin-bottom: 0; }

  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
  }

  .score-name {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  .score-weight {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .score-value {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
  }

  .score-bar-track {
    height: 4px;
    background: var(--border);
    position: relative;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
  }

  .score-bar-fill {
    height: 100%;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    position: relative;
  }

  .score-bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: -2px;
    width: 2px;
    height: 8px;
    background: inherit;
    filter: brightness(2);
  }

  /* STAT GRID */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-item {
    padding: 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
  }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .stat-unit {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: 4px;
  }

  /* YARA TABLE */
  .yara-table { width: 100%; border-collapse: collapse; }

  .yara-table th {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .yara-table td {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    padding: 10px 12px;
    border-bottom: 1px solid rgba(28,35,48,0.5);
    vertical-align: top;
  }

  .yara-table tr:last-child td { border-bottom: none; }

  .yara-rule-name {
    color: var(--accent-orange);
    font-weight: bold;
    font-size: 12px;
  }

  .yara-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 8px;
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.15);
    color: var(--accent-cyan);
    letter-spacing: 1px;
    margin: 2px 2px 2px 0;
  }

  .no-matches {
    text-align: center;
    padding: 30px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent-green);
    letter-spacing: 2px;
  }

  /* STRINGS LIST */
  .strings-scroll {
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-bright) transparent;
  }

  .string-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(28,35,48,0.4);
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .string-item:last-child { border-bottom: none; }

  .string-index {
    color: var(--text-dim);
    font-size: 10px;
    min-width: 24px;
    text-align: right;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .string-value {
    color: var(--accent-red);
    word-break: break-all;
    line-height: 1.4;
  }

  .ml-prob-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
  }

  .ml-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    min-width: 70px;
  }

  .ml-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    position: relative;
  }

  .ml-fill {
    height: 100%;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  }

  .ml-pct {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    min-width: 52px;
    text-align: right;
  }

  /* SECTIONS TABLE */
  .sections-table { width: 100%; border-collapse: collapse; }

  .sections-table th {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  .sections-table td {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    padding: 9px 10px;
    border-bottom: 1px solid rgba(28,35,48,0.4);
  }

  .entropy-hot { color: var(--accent-red); }
  .entropy-warm { color: var(--accent-orange); }
  .entropy-cool { color: var(--accent-green); }

  /* LOADING */
  .loading-overlay {
    padding: 60px 40px;
    text-align: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    margin-bottom: 20px;
  }

  .loading-spinner {
    width: 60px;
    height: 60px;
    border: 1px solid var(--border-bright);
    border-top-color: var(--accent-cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .loading-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* CHART CANVAS */
  .chart-container {
    position: relative;
    height: 200px;
    margin-top: 16px;
  }

  /* RADAR CHART */
  .radar-container {
    position: relative;
    height: 260px;
    margin-top: 8px;
  }

  /* IMPORTS */
  .imports-scroll {
    max-height: 180px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-bright) transparent;
  }

  .import-item {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-secondary);
    padding: 4px 0;
    border-bottom: 1px solid rgba(28,35,48,0.3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.5px;
  }

  .import-item:last-child { border-bottom: none; }

  .import-dll { color: var(--accent-cyan); opacity: 0.7; }

  /* UTILITY */
  .full-width { grid-column: 1 / -1; }
  .mt-20 { margin-top: 20px; }

  .badge-inline {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge-red { background: rgba(255,45,85,0.1); border: 1px solid rgba(255,45,85,0.3); color: var(--accent-red); }
  .badge-orange { background: rgba(255,107,43,0.1); border: 1px solid rgba(255,107,43,0.3); color: var(--accent-orange); }
  .badge-green { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--accent-green); }
  .badge-cyan { background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.2); color: var(--accent-cyan); }

  /* Scan action row */
  .scan-action-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 4px;
  }

  .api-url-input {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 12px 16px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
  }

  .api-url-input:focus { border-color: rgba(0,229,255,0.3); }

  @media (max-width: 900px) {
    .results-grid { grid-template-columns: 1fr; }
    .results-grid-3 { grid-template-columns: 1fr; }
    .verdict-card { flex-direction: column; align-items: flex-start; }
    .verdict-reasons { max-width: 100%; width: 100%; }
    .main { padding: 20px; }
    .header { padding: 14px 20px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const API_DEFAULT = "http://localhost:8000";

function formatBytes(b) {
  if (b < 1024) return `${b} B`;
  if (b < 1024 * 1024) return `${(b/1024).toFixed(1)} KB`;
  return `${(b/1024/1024).toFixed(2)} MB`;
}

function entropyClass(e) {
  if (e >= 7.5) return 'entropy-hot';
  if (e >= 6.5) return 'entropy-warm';
  return 'entropy-cool';
}

function getVerdictColor(v) {
  if (!v) return '#8b9cb5';
  if (v.toLowerCase() === 'malicious') return '#ff2d55';
  if (v.toLowerCase() === 'suspicious') return '#ff6b2b';
  return '#00ff88';
}

function ScoreRingChart({ score, verdict }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); }
    const color = getVerdictColor(verdict);
    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [score, 100 - score],
          backgroundColor: [color, 'rgba(28,35,48,0.5)'],
          borderWidth: 0,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '78%',
        animation: { animateRotate: true, duration: 900 },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [score, verdict]);

  return (
    <div className="verdict-score-ring">
      <canvas ref={canvasRef} width="100" height="100" />
      <div className="verdict-score-center">
        <span className="verdict-score-number" style={{ color: getVerdictColor(verdict) }}>{score}</span>
        <span className="verdict-score-label">THREAT</span>
      </div>
    </div>
  );
}

function ComponentScores({ yara, ml, entropy }) {
  const bars = [
    { name: 'YARA', weight: '40%', value: yara, color: '#ff6b2b' },
    { name: 'ML MODEL', weight: '40%', value: ml, color: '#00e5ff' },
    { name: 'ENTROPY', weight: '20%', value: entropy, color: '#ffd600' },
  ];
  return (
    <div className="panel-card">
      <div className="panel-card-title">Threat Score Breakdown</div>
      {bars.map(b => (
        <div key={b.name} className="score-component">
          <div className="score-row">
            <span className="score-name">{b.name}</span>
            <div style={{display:'flex',gap:'12px',alignItems:'center'}}>
              <span className="score-weight">{b.weight}</span>
              <span className="score-value" style={{color:b.color}}>{b.value.toFixed(1)}</span>
            </div>
          </div>
          <div className="score-bar-track">
            <div className="score-bar-fill" style={{
              width: `${Math.min(b.value, 100)}%`,
              background: `linear-gradient(90deg, ${b.color}99, ${b.color})`,
              boxShadow: `0 0 8px ${b.color}66`,
            }} />
          </div>
        </div>
      ))}
    </div>
  );
}

function StaticInfoCard({ data }) {
  return (
    <div className="panel-card">
      <div className="panel-card-title">Binary Properties</div>
      <div className="stat-grid">
        <div className="stat-item">
          <div className="stat-label">Format</div>
          <div className="stat-value" style={{fontSize:'14px',letterSpacing:'2px'}}>{data.format || '—'}</div>
        </div>
        <div className="stat-item">
          <div className="stat-label">File Size</div>
          <div className="stat-value" style={{fontSize:'14px'}}>{formatBytes(data.file_size || 0)}</div>
        </div>
        <div className="stat-item">
          <div className="stat-label">Entropy</div>
          <div className={`stat-value ${entropyClass(data.entropy || 0)}`}>{(data.entropy||0).toFixed(4)}</div>
        </div>
        <div className="stat-item">
          <div className="stat-label">Sections</div>
          <div className="stat-value">{data.sections_count || (data.sections||[]).length || 0}</div>
        </div>
        <div className="stat-item">
          <div className="stat-label">Imports</div>
          <div className="stat-value">{data.imports_count || (data.imports||[]).length || 0}</div>
        </div>
        <div className="stat-item">
          <div className="stat-label">Strings</div>
          <div className="stat-value">{data.strings_count || 0}</div>
        </div>
        {data.machine && (
          <div className="stat-item">
            <div className="stat-label">Architecture</div>
            <div className="stat-value" style={{fontSize:'12px',letterSpacing:'1px'}}>{data.machine}</div>
          </div>
        )}
        {data.is_dll !== undefined && (
          <div className="stat-item">
            <div className="stat-label">Type</div>
            <div className="stat-value" style={{fontSize:'13px'}}>{data.is_dll ? 'DLL' : data.is_64bit ? 'EXE64' : 'EXE32'}</div>
          </div>
        )}
      </div>
    </div>
  );
}

function YaraScanCard({ matches }) {
  const hasErrors = matches && matches.length === 1 && matches[0].error;
  const realMatches = matches ? matches.filter(m => !m.error) : [];
  return (
    <div className="panel-card">
      <div className="panel-card-title">
        YARA Scan Results
        <span style={{marginLeft:'10px'}} className={`badge-inline ${realMatches.length > 0 ? 'badge-red' : 'badge-green'}`}>
          {realMatches.length} MATCH{realMatches.length !== 1 ? 'ES' : ''}
        </span>
      </div>
      {hasErrors && (
        <div style={{fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--text-dim)',letterSpacing:'1px',marginBottom:'12px'}}>
          ⚠ {matches[0].error}
        </div>
      )}
      {realMatches.length === 0 && !hasErrors ? (
        <div className="no-matches">✓ NO YARA RULES MATCHED</div>
      ) : (
        <table className="yara-table">
          <thead>
            <tr>
              <th>RULE</th>
              <th>CATEGORY</th>
              <th>SEVERITY</th>
            </tr>
          </thead>
          <tbody>
            {realMatches.map((m, i) => (
              <tr key={i}>
                <td><span className="yara-rule-name">{m.rule}</span></td>
                <td>
                  {m.meta && m.meta.category && (
                    <span className="yara-tag">{m.meta.category}</span>
                  )}
                  {m.tags && m.tags.filter(t=>t!=='fallback_scan').map(t=>(
                    <span key={t} className="yara-tag">{t}</span>
                  ))}
                </td>
                <td>
                  {m.meta && m.meta.severity && (
                    <span className={`badge-inline ${
                      m.meta.severity==='critical'?'badge-red':
                      m.meta.severity==='high'?'badge-orange':'badge-cyan'
                    }`}>{m.meta.severity}</span>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

function MLPredictionCard({ ml }) {
  const malPct = ((ml.malware_probability||0)*100).toFixed(1);
  const benPct = ((ml.benign_probability||0)*100).toFixed(1);
  return (
    <div className="panel-card">
      <div className="panel-card-title">ML Prediction
        <span style={{marginLeft:'10px',fontFamily:'var(--font-mono)',fontSize:'9px',color:'var(--text-dim)',letterSpacing:'2px'}}>
          {ml.model_used}
        </span>
      </div>
      {ml.error && (
        <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--accent-orange)',marginBottom:'14px',letterSpacing:'1px',lineHeight:'1.5'}}>
          ⚠ {ml.error}
        </div>
      )}
      <div style={{marginBottom:'20px'}}>
        <div className="ml-prob-bar">
          <span className="ml-label">MALWARE</span>
          <div className="ml-track">
            <div className="ml-fill" style={{
              width:`${malPct}%`,
              background:'linear-gradient(90deg,#ff2d5599,#ff2d55)',
              boxShadow:'0 0 6px #ff2d5566',
            }} />
          </div>
          <span className="ml-pct" style={{color:'#ff2d55'}}>{malPct}%</span>
        </div>
        <div className="ml-prob-bar">
          <span className="ml-label">BENIGN</span>
          <div className="ml-track">
            <div className="ml-fill" style={{
              width:`${benPct}%`,
              background:'linear-gradient(90deg,#00ff8899,#00ff88)',
              boxShadow:'0 0 6px #00ff8844',
            }} />
          </div>
          <span className="ml-pct" style={{color:'#00ff88'}}>{benPct}%</span>
        </div>
      </div>
      {ml.features_used && (
        <div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'var(--text-dim)',letterSpacing:'2px',marginBottom:'10px',textTransform:'uppercase'}}>Features Extracted</div>
          {Object.entries(ml.features_used).map(([k,v]) => (
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(28,35,48,0.4)'}}>
              <span style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text-dim)',letterSpacing:'1px'}}>{k.replace(/_/g,' ')}</span>
              <span style={{fontFamily:'var(--font-display)',fontSize:'12px',color:'var(--text-secondary)',fontWeight:'700'}}>{typeof v === 'number' ? v.toFixed(4) : v}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function EntropyRadarChart({ sections }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !sections || sections.length === 0) return;
    if (chartRef.current) chartRef.current.destroy();

    const labels = sections.slice(0,8).map(s => s.name || '?');
    const entropies = sections.slice(0,8).map(s => parseFloat(s.entropy)||0);
    const colors = entropies.map(e => e>=7.5?'#ff2d55':e>=6.5?'#ff6b2b':'#00e5ff');

    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Section Entropy',
          data: entropies,
          backgroundColor: colors.map(c=>c+'66'),
          borderColor: colors,
          borderWidth: 1,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 700 },
        scales: {
          x: {
            ticks: { color:'#4a5568', font:{family:'Share Tech Mono',size:10} },
            grid: { color:'rgba(28,35,48,0.5)' },
          },
          y: {
            min: 0, max: 8,
            ticks: { color:'#4a5568', font:{family:'Share Tech Mono',size:10} },
            grid: { color:'rgba(28,35,48,0.5)' },
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor:'rgba(10,12,16,0.95)',
            borderColor:'rgba(0,229,255,0.2)',
            borderWidth:1,
            titleFont:{family:'Share Tech Mono',size:11},
            bodyFont:{family:'Share Tech Mono',size:11},
            titleColor:'#00e5ff',
            bodyColor:'#8b9cb5',
          }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [sections]);

  if (!sections || sections.length === 0) {
    return <div style={{fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--text-dim)',textAlign:'center',padding:'30px',letterSpacing:'2px'}}>NO SECTIONS</div>;
  }

  return <div className="chart-container"><canvas ref={canvasRef} /></div>;
}

function SectionsTable({ sections }) {
  return (
    <div className="panel-card">
      <div className="panel-card-title">Section Analysis</div>
      {(!sections || sections.length === 0) ? (
        <div style={{fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--text-dim)',textAlign:'center',padding:'20px',letterSpacing:'2px'}}>NO SECTION DATA</div>
      ) : (
        <>
          <table className="sections-table">
            <thead>
              <tr>
                <th>NAME</th>
                <th>SIZE</th>
                <th>ENTROPY</th>
                <th>FLAGS</th>
              </tr>
            </thead>
            <tbody>
              {sections.map((s, i) => (
                <tr key={i}>
                  <td style={{color:'var(--text-primary)',letterSpacing:'1px'}}>{s.name}</td>
                  <td>{s.size ? formatBytes(s.size) : s.size}</td>
                  <td><span className={entropyClass(s.entropy||0)}>{(s.entropy||0).toFixed(4)}</span></td>
                  <td style={{color:'var(--text-dim)',fontSize:'10px'}}>{s.characteristics || s.type || '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{marginTop:'16px'}}>
            <div className="panel-card-title" style={{marginTop:'0',fontSize:'9px'}}>Entropy by Section</div>
            <EntropyRadarChart sections={sections} />
          </div>
        </>
      )}
    </div>
  );
}

function SuspiciousStringsCard({ strings }) {
  return (
    <div className="panel-card">
      <div className="panel-card-title">
        Suspicious Strings
        <span style={{marginLeft:'10px'}} className={`badge-inline ${strings&&strings.length>0?'badge-red':'badge-green'}`}>
          {strings ? strings.length : 0}
        </span>
      </div>
      {(!strings || strings.length === 0) ? (
        <div style={{fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--accent-green)',textAlign:'center',padding:'20px',letterSpacing:'2px'}}>✓ NONE DETECTED</div>
      ) : (
        <div className="strings-scroll">
          {strings.map((s, i) => (
            <div key={i} className="string-item">
              <span className="string-index">{String(i+1).padStart(2,'0')}</span>
              <span className="string-value">{s}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ImportsCard({ imports }) {
  const MAX = 80;
  const shown = (imports || []).slice(0, MAX);
  return (
    <div className="panel-card">
      <div className="panel-card-title">
        Imports
        <span style={{marginLeft:'10px',fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text-dim)'}}>
          {imports ? imports.length : 0} total
        </span>
      </div>
      {(!imports || imports.length === 0) ? (
        <div style={{fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--text-dim)',textAlign:'center',padding:'20px',letterSpacing:'2px'}}>NO IMPORTS</div>
      ) : (
        <div className="imports-scroll">
          {shown.map((imp, i) => {
            const parts = imp.split('::');
            if (parts.length === 2) {
              return (
                <div key={i} className="import-item">
                  <span className="import-dll">{parts[0]}::</span>{parts[1]}
                </div>
              );
            }
            return <div key={i} className="import-item">{imp}</div>;
          })}
          {imports.length > MAX && (
            <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text-dim)',textAlign:'center',padding:'8px',letterSpacing:'2px'}}>
              ... +{imports.length - MAX} more
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [file, setFile] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [apiUrl, setApiUrl] = useState(API_DEFAULT);
  const fileInputRef = useRef(null);

  const handleFile = useCallback((f) => {
    if (!f) return;
    setFile(f);
    setResult(null);
    setError(null);
  }, []);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragging(false);
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  }, [handleFile]);

  const handleDragOver = (e) => { e.preventDefault(); setDragging(true); };
  const handleDragLeave = () => setDragging(false);

  const handleInputChange = (e) => {
    const f = e.target.files[0];
    if (f) handleFile(f);
  };

  const handleScan = async () => {
    if (!file || loading) return;
    setLoading(true);
    setError(null);
    setResult(null);

    const formData = new FormData();
    formData.append('file', file);

    try {
      const resp = await fetch(`${apiUrl}/analyze`, {
        method: 'POST',
        body: formData,
      });
      const data = await resp.json();
      if (!resp.ok) {
        setError(data.detail || `Server error: ${resp.status}`);
      } else {
        setResult(data);
      }
    } catch (err) {
      setError(`Connection failed: ${err.message}. Is the backend running at ${apiUrl}?`);
    } finally {
      setLoading(false);
    }
  };

  const verdictLower = result?.verdict?.toLowerCase() || '';

  return (
    <div>
      {/* HEADER */}
      <header className="header">
        <div className="header-logo">
          <div className="logo-icon">RX</div>
          <div>
            <div className="logo-text">RX<span>-</span>MORTEM</div>
            <div className="header-subtitle">Hybrid Static Malware Analysis System</div>
          </div>
        </div>
        <div className="header-status">
          <div className="status-indicator">
            <div className="status-dot" />
            SYSTEM ONLINE
          </div>
        </div>
      </header>

      <main className="main">
        {/* UPLOAD SECTION */}
        <div className="upload-section">
          <div className="section-label">// TARGET ACQUISITION</div>
          <div
            className={`upload-zone${dragging?' dragging':''}`}
            onDrop={handleDrop}
            onDragOver={handleDragOver}
            onDragLeave={handleDragLeave}
            onClick={() => fileInputRef.current?.click()}
          >
            <input
              type="file"
              ref={fileInputRef}
              accept=".exe,.elf,.bin,.dll,.so"
              onChange={handleInputChange}
            />
            <div className="upload-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
            </div>
            <div className="upload-title">DROP BINARY TARGET</div>
            <div className="upload-desc">
              Drag &amp; drop or click to select · <span>.exe .elf .bin .dll .so</span>
            </div>
          </div>

          {file && (
            <div className="file-info-bar">
              <span className="file-tag">{file.name.split('.').pop().toUpperCase()}</span>
              <span className="file-name">{file.name}</span>
              <span className="file-size-label">{formatBytes(file.size)}</span>
            </div>
          )}

          <div className="scan-action-row">
            <input
              className="api-url-input"
              value={apiUrl}
              onChange={e => setApiUrl(e.target.value)}
              placeholder="Backend API URL"
              spellCheck={false}
            />
            <button
              className={`btn-scan${loading?' loading':''}`}
              onClick={handleScan}
              disabled={!file || loading}
            >
              {loading ? (
                <>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                  </svg>
                  SCANNING
                </>
              ) : (
                <>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                  </svg>
                  INITIATE SCAN
                </>
              )}
            </button>
          </div>
        </div>

        {/* ERROR */}
        {error && <div className="error-banner">⚠ ERROR :: {error}</div>}

        {/* LOADING */}
        {loading && (
          <div className="loading-overlay">
            <div className="loading-spinner" />
            <div className="loading-text">ANALYZING TARGET<span className="loading-dots" /></div>
            <div className="loading-sub">RUNNING STATIC · YARA · ML PIPELINE</div>
          </div>
        )}

        {/* RESULTS */}
        {result && !loading && (
          <>
            <div className="section-label">// ANALYSIS REPORT</div>

            {/* VERDICT */}
            <div className="results-grid" style={{marginBottom:'20px'}}>
              <div className={`verdict-card ${verdictLower}`}>
                <ScoreRingChart score={result.threat_score} verdict={result.verdict} />
                <div className="verdict-info">
                  <div className={`verdict-badge ${verdictLower}`}>{result.verdict}</div>
                  <div className="verdict-filename">{result.filename}</div>
                  <div className="verdict-meta">
                    {result.file_type?.toUpperCase()} · {formatBytes(result.file_size)} · {result.static_analysis?.format || ''}
                    {result.static_analysis?.machine ? ` · ${result.static_analysis.machine}` : ''}
                  </div>
                </div>
                <div className="verdict-reasons">
                  <div className="reasons-title">// INDICATORS</div>
                  {(result.reasons||[]).map((r,i) => (
                    <div key={i} className="reason-item">
                      <span className="reason-bullet">▸</span>
                      <span>{r}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* SCORE BREAKDOWN + STATIC INFO + ML */}
            <div className="results-grid-3" style={{marginBottom:'20px'}}>
              <ComponentScores
                yara={result.yara_score}
                ml={result.ml_score}
                entropy={result.entropy_score}
              />
              <StaticInfoCard data={result.static_analysis || {}} />
              <MLPredictionCard ml={result.ml_prediction || {}} />
            </div>

            {/* YARA + STRINGS */}
            <div className="results-grid" style={{marginBottom:'20px'}}>
              <YaraScanCard matches={result.yara_matches || []} />
              <SuspiciousStringsCard strings={result.static_analysis?.suspicious_strings || []} />
            </div>

            {/* SECTIONS + IMPORTS */}
            <div className="results-grid" style={{marginBottom:'40px'}}>
              <SectionsTable sections={result.static_analysis?.sections || []} />
              <ImportsCard imports={result.static_analysis?.imports || []} />
            </div>
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
