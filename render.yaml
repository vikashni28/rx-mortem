services:
  - type: web
    name: rx-mortem-api
    runtime: python-3.11
    buildCommand: pip install --prefer-binary -r requirements.txt && python ml/train.py
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PYTHONUNBUFFERED
        value: "1"
